default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  url: <%
    uri = URI.parse(ENV['DATABASE_URL'])
    uri.path = "#{uri.path}_development"
    uri.to_s
  %>

test:
  <<: *default
  url: <%
    uri = URI.parse(ENV['DATABASE_URL'])
    uri.path = "#{uri.path}_test"
    uri.to_s
  %>

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
